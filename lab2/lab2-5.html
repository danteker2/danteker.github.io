<head>

                </td>
            </tr>

                        <option>1981</option>

                        <option>1990</option>

                        <option>1992</option>
                        <option>1993</option>

                        <option>1996</option>
                        <option>1997</option>
                        <option>1998</option>
                        <option>1999</option>
                        <option>2000</option>

                        <option>2002</option>
                        <option>2003</option>
                        <option>2004</option>
                        <option>2005</option>
                        <option>2006</option>
                        <option>2007</option>

                    </select>
                    -й
                </td>
            </tr>

                <td>
                    <label><input type="checkbox" checked disabled> Русский</label><br>
                    <label><input type="checkbox"> Испанский</label><br>
                    <label><input type="checkbox"> Немецкий</label><br>
                    <label><input type="checkbox"> Английский</label><br>
                    <label><input type="checkbox"> Китайский</label>

            </tr>
            <tr>
                <td><label>Обо мне</label></td>
                <td><textarea placeholder="Напишите коротко о себе" rows="5" cols="40"></textarea></td>
            </tr>

                    <input type="submit" value="Готово">

            </tr>
        </table>
