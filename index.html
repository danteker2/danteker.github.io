<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Лабораторные работы</title>
  <!-- Добавляем стили для iframe -->
    <style>
        .iframe-container {
            width: 100%;
            min-height: 600px; /* Высота фрейма */
            margin: 20px 0;
            border: 1px solid #ccc;
        }
        
        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
  <h1>Лабораторные работы</h1>
  <!-- Добавляем контейнер для iframe -->
    <div class="iframe-container">
        <iframe id="contentFrame" src="" frameborder="0"></iframe>
    </div>
  <ul>
        <li><a href="#" onclick="loadFrame('main/lab1/lab1_1.html')">Лабораторная 1.1</a></li>
        <li><a href="#" onclick="loadFrame('main/lab1/lab1_2.html')">Лабораторная 1.2</a></li>
        <li><a href="#" onclick="loadFrame('main/lab1/docs/doc.html')">Лабораторная 1.3</a></li>
        <li><a href="#" onclick="loadFrame('main/lab1/images/lab1_4.html')">Лабораторная 1.4</a></li>
        <li><a href="#" onclick="loadFrame('main/lab1/lab1_5.html')">Лабораторная 1.5</a></li>
    </ul>

    <script>
        // Функция для загрузки содержимого в iframe
        function loadFrame(url) {
            document.getElementById('contentFrame').src = url;
        }
</body>
</html>
