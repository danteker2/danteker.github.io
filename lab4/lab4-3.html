<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Menu-2</title>
    <style>
        html {
            background: #f0f0f0;
        }
        .menu {
            width: 200px;
            background: #fff;
            padding: 10px;
        }
        .menu ul {
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .menu li {
            margin: 5px 0;
        }
        .menu li a {
            color: #0066cc;
            font-size: 14px;
            display: inline-block;
        }
        .menu li a:hover {
            color: #cc0000;
        }

        .menu li a::before,
        .menu li li a::before {
            content: "";
            display: inline-block;
            width: 16px;
            height: 16px;
            background-image: url('css_sprites.png');
            background-repeat: no-repeat;
            margin-right: 5px;
            vertical-align: middle;
        }

        .menu > ul > li > a::before {
             background-position: -48px -8px; 	/* плюс */
        }

        .menu > ul > li > a:hover::before {
             background-position: -13px -8px; 	/* минус*/
        }

        .menu li li a::before {
             background-position: -13px -44px;	 /* точка */
        }

        .menu li ul {
            margin-left: 20px;
            display: none;
        }

        .menu li:hover > ul {
            display: block;
        }
    </style>
</head>
<body>
	<nav class="menu">
		<ul>
			<li><a href="#">Фильмы</a>
				<ul>
					<li><a href="#">Экшн</a></li>
					<li><a href="#">Мелодрамы</a></li>
					<li><a href="#">Сериалы</a></li>
					<li><a href="#">Семейные</a></li>
				</ul>
			</li>
			<li><a href="#">Музыка</a>
				<ul>
					<li><a href="#">Классика</a></li>
					<li><a href="#">Джаз</a></li>
					<li><a href="#">Рок</a></li>
					<li><a href="#">Грандж</a></li>
				</ul>
			</li>
			<li><a href="#">Софт</a>
				<ul>
					<li><a href="#">Графика</a></li>
					<li><a href="#">3D-моделирование</a></li>
					<li><a href="#">Машинопись</a></li>
					<li><a href="#">Переводчики</a></li>
				</ul>
			</li>
			<li><a href="#">Игры</a>
				<ul>
					<li><a href="#">РПГ</a></li>
					<li><a href="#">Шутеры</a></li>
					<li><a href="#">Пасьянсы</a></li>
				</ul>
			</li>
		</ul>
	</nav>
</body>
</html>
