<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<title>Оформление вертикального меню</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	<style>
		html {
			background: #f0f0f0;
		}
		
		.menu {
			width: 200px;
			background: #fff;
			padding: 10px;
		}
		
		.menu ul {
			list-style: none;
			margin: 0;
			padding: 0;
		}
		
		.menu li {
			margin: 5px 0;
		}
		
		.menu li a {
			text-decoration: underline;
			color: #0066cc;
			font-size: 14px;
			display: inline-block;
		}
		
		.menu li a:hover {
			color: #cc0000;
		}
		
		.menu li ul {
			margin-left: 20px;
			display: none;
		}
		
		.menu li:hover > ul {
			display: block;
		}
		
		.menu > ul > li > a::before {
			font-family: "Font Awesome 6 Free";
			font-weight: 900;
			content: "\f0fe";
			margin-right: 5px;
			color: #333;
		}
		
		.menu > ul > li:hover > a::before {
			content: "\f146";
		}
		
		.menu > ul > li > ul > li > a::before {
			font-family: "Font Awesome 6 Free";
			font-weight: 400;
			content: "\f192";
			margin-right: 5px;
			color: #666;
		}
	</style>
</head>
<body>
	<nav class="menu">
		<ul>
			<li><a href="#">Фильмы</a>
				<ul>
					<li><a href="#">Экшн</a></li>
					<li><a href="#">Мелодрамы</a></li>
					<li><a href="#">Сериалы</a></li>
					<li><a href="#">Семейные</a></li>
				</ul>
			</li>
			<li><a href="#">Музыка</a>
				<ul>
					<li><a href="#">Классика</a></li>
					<li><a href="#">Джаз</a></li>
					<li><a href="#">Рок</a></li>
					<li><a href="#">Грандж</a></li>
				</ul>
			</li>
			<li><a href="#">Софт</a>
				<ul>
					<li><a href="#">Графика</a></li>
					<li><a href="#">3D-моделирование</a></li>
					<li><a href="#">Машинопись</a></li>
					<li><a href="#">Переводчики</a></li>
				</ul>
			</li>
			<li><a href="#">Игры</a>
				<ul>
					<li><a href="#">РПГ</a></li>
					<li><a href="#">Шутеры</a></li>
					<li><a href="#">Пасьянсы</a></li>
				</ul>
			</li>
		</ul>
	</nav>
</body>
</html>
